name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizer-test:
    runs-on: ubuntu-latest

    env:
      ASAN_OPTIONS: detect_leaks=0:strict_string_checks=1
      UBSAN_OPTIONS: print_stacktrace=1

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build-sanitizer
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fsanitize-address-use-after-scope -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build-sanitizer

      - name: Test
        run: ctest --test-dir build-sanitizer --output-on-failure
